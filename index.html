<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Faculty Hub Prototype</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<header class="topbar">
		<div class="topbar-left">
			<button class="icon-button" aria-label="Open menu">
				<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
					<path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"></path>
				</svg>
			</button>
		</div>
		<div class="topbar-right">
			<span class="welcome" id="welcomeText">Welcome, Daniel</span>
			<button class="icon-button" aria-label="Profile">
				<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
					<path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.42 0-8 2-8 4.5V21h16v-2.5C20 16 16.42 14 12 14z"></path>
				</svg>
			</button>
		</div>
	</header>

	<main class="shell">
		<h1 class="greeting" id="helloText">Hello Daniel</h1>

		<section class="fixed-row" id="fixedRow"></section>

		<hr class="section-divider" />

		<section>
			<div class="custom-header">
				<h2>Custom Widgets</h2>
				<button class="add-btn" id="openAddModalBtn">+ Add Widget</button>
			</div>
			<div class="custom-grid" id="customGrid"></div>
		</section>
	</main>

	<div class="modal-wrap" id="widgetModal" aria-hidden="true">
		<div class="modal" role="dialog" aria-modal="true" aria-label="Add widget">
			<aside class="modal-sidebar">
				<h3>Categories</h3>
				<div class="category-list" id="categoryList"></div>
			</aside>
			<section class="modal-main">
				<div class="modal-top">
					<h3 class="modal-title">Add Widget</h3>
					<input
						class="search"
						id="widgetSearch"
						type="text"
						placeholder="Search widgets"
						aria-label="Search widgets"
					/>
				</div>
				<div class="widget-option-grid" id="widgetOptionGrid"></div>
				<div class="modal-actions">
					<button class="btn cancel" id="cancelModalBtn">Cancel</button>
					<button class="btn primary" id="addSelectedWidgetBtn" disabled>Add Selected Widget</button>
				</div>
			</section>
		</div>
	</div>

	<script src="app.js"></script>
</body>
</html>
