<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Faculty Hub Prototype</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
		rel="stylesheet"
	/>
	<style>
		:root {
			--header-blue: #0674bd;
			--bg-start: #cfe5f5;
			--bg-end: #8db6d6;
			--card-bg: #f3f5f8;
			--card-border: rgba(255, 255, 255, 0.4);
			--ink-900: #111111;
			--ink-700: #2f3135;
			--ink-500: #5f6670;
			--accent: #0b7bd0;
			--accent-soft: #c2e2f9;
			--danger: #ca3c3c;
			--shadow-soft: 0 8px 22px rgba(8, 60, 101, 0.12);
			--radius-lg: 14px;
			--radius-md: 10px;
			--radius-sm: 8px;
			--container: 1220px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: "Roboto", sans-serif;
		}

		body {
			min-height: 100vh;
			background: radial-gradient(circle at 8% 5%, rgba(255, 255, 255, 0.42), transparent 34%),
				radial-gradient(circle at 95% 80%, rgba(255, 255, 255, 0.28), transparent 30%),
				linear-gradient(135deg, var(--bg-start), var(--bg-end));
			color: var(--ink-900);
		}

		.topbar {
			background: var(--header-blue);
			color: #ffffff;
			height: 56px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 16px;
			box-shadow: 0 2px 12px rgba(4, 40, 69, 0.2);
		}

		.topbar-left,
		.topbar-right {
			display: flex;
			align-items: center;
			gap: 18px;
		}

		.icon-button {
			border: 0;
			background: transparent;
			color: inherit;
			cursor: pointer;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 30px;
			height: 30px;
			border-radius: 50%;
			transition: background-color 0.18s ease;
		}

		.icon-button:hover {
			background-color: rgba(255, 255, 255, 0.18);
		}

		.welcome {
			font-size: 1rem;
			font-weight: 700;
			letter-spacing: 0.2px;
		}

		.shell {
			max-width: var(--container);
			margin: 0 auto;
			padding: 34px 26px 48px;
			animation: fade-slide 0.55s ease-out;
		}

		.greeting {
			font-size: clamp(2rem, 4.2vw, 3.35rem);
			line-height: 1;
			font-weight: 900;
			margin-bottom: 28px;
		}

		.fixed-row {
			display: grid;
			grid-template-columns: minmax(250px, 1fr) minmax(380px, 2.1fr);
			gap: 16px;
			margin-bottom: 26px;
		}

		.section-divider {
			border: 0;
			border-top: 1px solid rgba(255, 255, 255, 0.55);
			margin-bottom: 12px;
		}

		.custom-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 14px;
			gap: 12px;
		}

		.custom-header h2 {
			font-size: 1.95rem;
			font-weight: 900;
			color: var(--ink-900);
		}

		.add-btn {
			border: 0;
			border-radius: 10px;
			background: var(--accent-soft);
			color: #0a3f64;
			font-weight: 700;
			padding: 10px 15px;
			cursor: pointer;
			transition: transform 0.2s ease, filter 0.2s ease;
		}

		.add-btn:hover {
			transform: translateY(-1px);
			filter: brightness(0.98);
		}

		.custom-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(270px, 1fr));
			gap: 14px;
			align-items: stretch;
		}

		.card {
			position: relative;
			border-radius: var(--radius-lg);
			background: var(--card-bg);
			border: 1px solid var(--card-border);
			box-shadow: var(--shadow-soft);
			min-height: 150px;
			padding: 14px 14px 12px;
			overflow: visible;
			animation: reveal 0.26s ease;
		}

		.card.fixed {
			min-height: 170px;
		}

		.card-title {
			font-weight: 900;
			font-size: 1.6rem;
			margin-bottom: 12px;
		}

		.widget-title {
			font-weight: 900;
			font-size: 1.7rem;
			line-height: 1.05;
		}

		.menu-btn {
			position: absolute;
			top: 10px;
			right: 10px;
			border: 0;
			background: transparent;
			color: var(--ink-700);
			width: 28px;
			height: 28px;
			border-radius: 50%;
			cursor: pointer;
			font-size: 1.2rem;
			line-height: 1;
			font-weight: 700;
			letter-spacing: 0.5px;
		}

		.menu-btn:hover {
			background: rgba(11, 123, 208, 0.1);
		}

		.menu-panel {
			position: absolute;
			top: 42px;
			right: 10px;
			z-index: 7;
			width: 145px;
			border-radius: 10px;
			overflow: hidden;
			background: #ffffff;
			border: 1px solid rgba(9, 71, 117, 0.2);
			box-shadow: 0 8px 20px rgba(10, 46, 75, 0.2);
			display: none;
		}

		.menu-panel.show {
			display: block;
		}

		.menu-panel button {
			width: 100%;
			text-align: left;
			border: 0;
			background: #ffffff;
			padding: 8px 10px;
			font-size: 0.9rem;
			cursor: pointer;
			color: var(--ink-700);
		}

		.menu-panel button:hover {
			background: #edf5fb;
		}

		.menu-panel .remove {
			color: var(--danger);
		}

		.card-footer {
			position: absolute;
			right: 12px;
			bottom: 10px;
			left: 12px;
			display: flex;
			justify-content: flex-end;
			align-items: center;
			gap: 8px;
		}

		.mini-pill {
			border: 0;
			background: #b8dbf2;
			color: #104162;
			border-radius: 999px;
			font-size: 0.78rem;
			padding: 4px 16px;
			min-width: 62px;
			text-align: center;
			cursor: pointer;
		}

		.placeholder {
			border: 2px dashed rgba(11, 123, 208, 0.62);
			background: rgba(232, 244, 253, 0.4);
			box-shadow: none;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 150px;
			cursor: pointer;
			transition: background 0.2s ease;
		}

		.placeholder:hover {
			background: rgba(220, 238, 250, 0.8);
		}

		.placeholder-inner {
			text-align: center;
			color: rgba(7, 77, 124, 0.7);
			font-weight: 700;
		}

		.placeholder-inner .plus {
			font-size: 2.2rem;
			line-height: 1;
			margin-bottom: 4px;
		}

		.resources-list {
			display: grid;
			gap: 8px;
			margin-top: 9px;
		}

		.resource-item {
			border: 1px solid #dce7ef;
			border-radius: var(--radius-sm);
			background: #f9fcfe;
			overflow: hidden;
		}

		.resource-toggle {
			width: 100%;
			border: 0;
			background: transparent;
			text-align: left;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 8px 10px;
			font-size: 0.89rem;
			color: #222933;
			cursor: pointer;
		}

		.resource-content {
			max-height: 0;
			overflow: hidden;
			transition: max-height 0.2s ease;
			font-size: 0.84rem;
			color: #4e5967;
			padding: 0 10px;
		}

		.resource-item.open .resource-content {
			max-height: 70px;
			padding: 0 10px 9px;
		}

		.calendar-grid {
			margin-top: 8px;
			border-radius: 9px;
			border: 1px solid #dae5ed;
			overflow: hidden;
			background: #ffffff;
		}

		.calendar-header,
		.calendar-row {
			display: grid;
			grid-template-columns: repeat(7, minmax(0, 1fr));
		}

		.calendar-header div,
		.calendar-row div {
			border-right: 1px solid #eef3f7;
			border-bottom: 1px solid #eef3f7;
			text-align: center;
			padding: 5px 0;
			font-size: 0.74rem;
			color: #445262;
			min-height: 23px;
		}

		.calendar-header div {
			background: #f0f7fd;
			font-weight: 700;
			color: #29506d;
		}

		.calendar-row div:last-child,
		.calendar-header div:last-child {
			border-right: 0;
		}

		.calendar-row:last-child div {
			border-bottom: 0;
		}

		.modal-wrap {
			position: fixed;
			inset: 0;
			display: none;
			place-items: center;
			background: rgba(6, 22, 36, 0.42);
			backdrop-filter: blur(2px);
			z-index: 50;
			padding: 16px;
		}

		.modal-wrap.show {
			display: grid;
		}

		.modal {
			width: min(940px, 100%);
			min-height: 470px;
			border-radius: 14px;
			background: #f6fafd;
			border: 1px solid rgba(17, 90, 141, 0.2);
			box-shadow: 0 18px 44px rgba(2, 30, 52, 0.28);
			display: grid;
			grid-template-columns: 200px 1fr;
			overflow: hidden;
			animation: pop-in 0.2s ease;
		}

		.modal-sidebar {
			padding: 14px;
			border-right: 1px solid #dde9f1;
			background: #edf5fb;
		}

		.modal-sidebar h3 {
			font-size: 0.84rem;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: #336081;
			margin-bottom: 8px;
		}

		.category-list {
			display: grid;
			gap: 7px;
		}

		.category-btn {
			border: 1px solid #d2e2ee;
			background: #ffffff;
			border-radius: 9px;
			padding: 8px 10px;
			text-align: left;
			color: #274b66;
			cursor: pointer;
			font-weight: 500;
		}

		.category-btn.active {
			border-color: #7cb8df;
			background: #d8edf9;
			font-weight: 700;
		}

		.modal-main {
			padding: 14px;
			display: grid;
			grid-template-rows: auto 1fr auto;
			gap: 12px;
		}

		.modal-top {
			display: flex;
			gap: 10px;
			align-items: center;
			justify-content: space-between;
		}

		.modal-title {
			font-size: 1.2rem;
			font-weight: 800;
		}

		.search {
			flex: 1;
			max-width: 350px;
			border: 1px solid #c9dceb;
			border-radius: 10px;
			padding: 9px 11px;
			font-size: 0.93rem;
		}

		.search:focus {
			outline: 2px solid #abd3ef;
			border-color: #8dbfe1;
		}

		.widget-option-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(220px, 1fr));
			gap: 10px;
			align-content: start;
			overflow: auto;
			padding-right: 4px;
		}

		.widget-option {
			border: 1px solid #d7e5f0;
			border-radius: 10px;
			background: #ffffff;
			padding: 12px;
			cursor: pointer;
			transition: border-color 0.18s ease, transform 0.18s ease;
		}

		.widget-option:hover {
			border-color: #8dc2e4;
			transform: translateY(-1px);
		}

		.widget-option h4 {
			font-size: 1.02rem;
			margin-bottom: 6px;
			color: #102a3e;
		}

		.widget-option p {
			font-size: 0.88rem;
			color: #4a6073;
			line-height: 1.38;
		}

		.modal-actions {
			display: flex;
			justify-content: flex-end;
			gap: 10px;
		}

		.btn {
			border: 0;
			border-radius: 10px;
			padding: 9px 14px;
			cursor: pointer;
			font-weight: 700;
		}

		.btn.cancel {
			background: #e6eef5;
			color: #203f57;
		}

		.btn.primary {
			background: var(--accent);
			color: #ffffff;
		}

		.widget-option.selected {
			border-color: #4197d0;
			background: #eaf5fc;
		}

		@media (max-width: 900px) {
			.shell {
				padding: 24px 16px 42px;
			}

			.fixed-row,
			.custom-grid,
			.widget-option-grid {
				grid-template-columns: 1fr;
			}

			.custom-header h2 {
				font-size: 1.6rem;
			}

			.modal {
				grid-template-columns: 1fr;
				min-height: 540px;
			}

			.modal-sidebar {
				border-right: 0;
				border-bottom: 1px solid #dde9f1;
			}

			.category-list {
				grid-template-columns: repeat(2, minmax(100px, 1fr));
			}
		}

		@keyframes pop-in {
			from {
				opacity: 0;
				transform: translateY(8px) scale(0.98);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes reveal {
			from {
				opacity: 0;
				transform: translateY(8px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fade-slide {
			from {
				opacity: 0;
				transform: translateY(6px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>
<body>
	<header class="topbar">
		<div class="topbar-left">
			<button class="icon-button" aria-label="Open menu">
				<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
					<path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"></path>
				</svg>
			</button>
		</div>
		<div class="topbar-right">
			<span class="welcome" id="welcomeText">Welcome, Daniel</span>
			<button class="icon-button" aria-label="Profile">
				<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
					<path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.42 0-8 2-8 4.5V21h16v-2.5C20 16 16.42 14 12 14z"></path>
				</svg>
			</button>
		</div>
	</header>

	<main class="shell">
		<h1 class="greeting" id="helloText">Hello Daniel</h1>

		<section class="fixed-row" id="fixedRow"></section>

		<hr class="section-divider" />

		<section>
			<div class="custom-header">
				<h2>Custom Widgets</h2>
				<button class="add-btn" id="openAddModalBtn">+ Add Widget</button>
			</div>
			<div class="custom-grid" id="customGrid"></div>
		</section>
	</main>

	<div class="modal-wrap" id="widgetModal" aria-hidden="true">
		<div class="modal" role="dialog" aria-modal="true" aria-label="Add widget">
			<aside class="modal-sidebar">
				<h3>Categories</h3>
				<div class="category-list" id="categoryList"></div>
			</aside>
			<section class="modal-main">
				<div class="modal-top">
					<h3 class="modal-title">Add Widget</h3>
					<input
						class="search"
						id="widgetSearch"
						type="text"
						placeholder="Search widgets"
						aria-label="Search widgets"
					/>
				</div>
				<div class="widget-option-grid" id="widgetOptionGrid"></div>
				<div class="modal-actions">
					<button class="btn cancel" id="cancelModalBtn">Cancel</button>
					<button class="btn primary" id="addSelectedWidgetBtn" disabled>Add Selected Widget</button>
				</div>
			</section>
		</div>
	</div>

	<script>
		const widgetCatalog = {
			goals: {
				id: "goals",
				type: "goals",
				title: "Goals",
				category: "Teaching",
				description: "Track integration goals and update progress quickly.",
				locked: true
			},
			courseOverview: {
				id: "course-overview",
				type: "courseOverview",
				title: "Course Overview",
				category: "Teaching",
				description: "Course summaries and performance placeholders.",
				locked: true
			},
			resources: {
				type: "resources",
				title: "Resources",
				category: "Resources",
				description: "Expandable links for forms and consultation tools."
			},
			mentorship: {
				type: "mentorship",
				title: "Mentorship",
				category: "Teaching",
				description: "Mentoring notes and follow-up reminders."
			},
			scot: {
				type: "scot",
				title: "SCOT",
				category: "Reporting",
				description: "Informational reporting widget placeholder."
			},
			calendar: {
				type: "calendar",
				title: "Calendar",
				category: "Teaching",
				description: "Month grid and upcoming classroom schedule."
			}
		};

		const state = {
			user: {
				name: "Daniel",
				role: "faculty"
			},
			widgets: [
				{
					id: "goals",
					type: "goals",
					locked: true,
					position: 0
				},
				{
					id: "course-overview",
					type: "courseOverview",
					locked: true,
					position: 1
				},
				{
					id: "resources-1",
					type: "resources",
					locked: false,
					position: 2
				},
				{
					id: "mentorship-1",
					type: "mentorship",
					locked: false,
					position: 3
				},
				{
					id: "calendar-1",
					type: "calendar",
					locked: false,
					position: 4
				}
			]
		};

		const modalState = {
			open: false,
			category: "All",
			search: "",
			selectedType: null
		};

		const fixedRow = document.getElementById("fixedRow");
		const customGrid = document.getElementById("customGrid");
		const welcomeText = document.getElementById("welcomeText");
		const helloText = document.getElementById("helloText");

		const widgetModal = document.getElementById("widgetModal");
		const widgetSearch = document.getElementById("widgetSearch");
		const categoryList = document.getElementById("categoryList");
		const widgetOptionGrid = document.getElementById("widgetOptionGrid");
		const addSelectedWidgetBtn = document.getElementById("addSelectedWidgetBtn");

		const openAddModalBtn = document.getElementById("openAddModalBtn");
		const cancelModalBtn = document.getElementById("cancelModalBtn");

		openAddModalBtn.addEventListener("click", openModal);
		cancelModalBtn.addEventListener("click", closeModal);
		addSelectedWidgetBtn.addEventListener("click", addSelectedWidget);
		widgetSearch.addEventListener("input", (event) => {
			modalState.search = event.target.value.trim().toLowerCase();
			renderModalOptions();
		});

		widgetModal.addEventListener("click", (event) => {
			if (event.target === widgetModal) {
				closeModal();
			}
		});

		document.addEventListener("click", (event) => {
			if (!event.target.closest(".widget-menu")) {
				document.querySelectorAll(".menu-panel.show").forEach((menu) => {
					menu.classList.remove("show");
				});
			}
		});

		function normalizePositions() {
			state.widgets.forEach((widget, index) => {
				widget.position = index;
			});
		}

		function getFixedWidgets() {
			return state.widgets.filter((widget) => widget.locked).sort((a, b) => a.position - b.position);
		}

		function getCustomWidgets() {
			return state.widgets.filter((widget) => !widget.locked).sort((a, b) => a.position - b.position);
		}

		function renderWidgetBody(type, isFixed) {
			if (type === "resources") {
				return `
					<div class="resources-list">
						${[
							"Peer Observation Form",
							"SCOT",
							"Consultation With a Curriculum Designer",
							"Consultation With Assessment Consultant",
							"Learning and Teaching Website"
						]
							.map(
								(item, index) => `
								<div class="resource-item ${index === 0 ? "open" : ""}">
									<button class="resource-toggle" type="button">
										<span>${item}</span>
										<span>${index === 0 ? "-" : "+"}</span>
									</button>
									<div class="resource-content">Access this resource from the faculty support library.</div>
								</div>`
							)
							.join("")}
					</div>
				`;
			}

			if (type === "calendar") {
				return `
					<div class="calendar-grid">
						<div class="calendar-header">
							<div>Su</div><div>M</div><div>T</div><div>W</div><div>Th</div><div>F</div><div>Sa</div>
						</div>
						<div class="calendar-row"><div></div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div></div>
						<div class="calendar-row"><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div><div>12</div><div>13</div></div>
						<div class="calendar-row"><div>14</div><div>15</div><div>16</div><div>17</div><div>18</div><div>19</div><div>20</div></div>
						<div class="calendar-row"><div>21</div><div>22</div><div>23</div><div>24</div><div>25</div><div>26</div><div>27</div></div>
						<div class="calendar-row"><div>28</div><div>29</div><div>30</div><div></div><div></div><div></div><div></div></div>
					</div>
				`;
			}

			if (type === "scot") {
				return "<p style='font-size:0.92rem;color:#46586a;line-height:1.45;margin-top:12px;'>SCOT reporting data appears here for annual review preparation. This widget is informational only.</p>";
			}

			if (type === "mentorship") {
				return "<p style='font-size:0.92rem;color:#46586a;line-height:1.45;margin-top:12px;'>Track mentoring check-ins and support plans for your assigned students this term.</p>";
			}

			if (type === "goals") {
				return `
					<p style="font-size:0.92rem;color:#46586a;line-height:1.45;margin-top:6px;">Integrate scripture into the Economics 110 course.</p>
					<p style="font-size:0.81rem;color:#576a7d;margin-top:8px;">15 / 50 completed (30%)</p>
					${isFixed ? "" : "<div class='card-footer'><button class='mini-pill'>Update</button></div>"}
				`;
			}

			if (type === "courseOverview") {
				return `
					<p style="font-size:0.92rem;color:#46586a;line-height:1.45;margin-top:6px;">ENGL 150, ENGL 160, ENGL 301 active this term.</p>
					<p style="font-size:0.81rem;color:#576a7d;margin-top:8px;">Average engagement: 84% | Developing discipleship score: 4.1</p>
					${isFixed ? "" : "<div class='card-footer'><button class='mini-pill'>Details</button></div>"}
				`;
			}

			return "";
		}

		function renderFixedWidgets() {
			const fixedWidgets = getFixedWidgets();
			fixedRow.innerHTML = fixedWidgets
				.map((widget) => {
					const spec = widgetCatalog[widget.type];
					return `
						<article class="card fixed">
							<h2 class="widget-title">${spec.title}</h2>
							${renderWidgetBody(widget.type, true)}
							<div class="card-footer"><button class="mini-pill">button</button></div>
						</article>
					`;
				})
				.join("");
		}

		function renderCustomWidgets() {
			const customWidgets = getCustomWidgets();
			customGrid.innerHTML = customWidgets
				.map((widget) => {
					const spec = widgetCatalog[widget.type];
					return `
						<article class="card" data-widget-id="${widget.id}">
							<h3 class="widget-title">${spec.title}</h3>
							<div class="widget-menu">
								<button class="menu-btn" aria-label="Open widget menu">...</button>
								<div class="menu-panel">
									<button data-action="move-up">Move Up</button>
									<button data-action="move-down">Move Down</button>
									<button data-action="remove" class="remove">Remove Widget</button>
								</div>
							</div>
							${renderWidgetBody(widget.type, false)}
						</article>
					`;
				})
				.join("");

			const placeholderCard = document.createElement("article");
			placeholderCard.className = "card placeholder";
			placeholderCard.innerHTML = `
				<div class="placeholder-inner">
					<div class="plus">+</div>
					<div>Add Widget</div>
				</div>
			`;
			placeholderCard.addEventListener("click", openModal);
			customGrid.appendChild(placeholderCard);

			customGrid.querySelectorAll(".menu-btn").forEach((button) => {
				button.addEventListener("click", (event) => {
					const panel = event.target.nextElementSibling;
					document.querySelectorAll(".menu-panel.show").forEach((menu) => {
						if (menu !== panel) {
							menu.classList.remove("show");
						}
					});
					panel.classList.toggle("show");
				});
			});

			customGrid.querySelectorAll(".menu-panel button").forEach((button) => {
				button.addEventListener("click", (event) => {
					const card = event.target.closest(".card");
					const widgetId = card.dataset.widgetId;
					const action = event.target.dataset.action;
					performWidgetAction(widgetId, action);
				});
			});

			customGrid.querySelectorAll(".resource-toggle").forEach((toggle) => {
				toggle.addEventListener("click", (event) => {
					const item = event.currentTarget.closest(".resource-item");
					const isOpen = item.classList.toggle("open");
					event.currentTarget.lastElementChild.textContent = isOpen ? "-" : "+";
				});
			});
		}

		function performWidgetAction(widgetId, action) {
			const target = state.widgets.find((widget) => widget.id === widgetId);
			if (!target || target.locked) {
				return;
			}

			const customWidgets = getCustomWidgets();
			const index = customWidgets.findIndex((widget) => widget.id === widgetId);

			if (action === "remove") {
				state.widgets = state.widgets.filter((widget) => widget.id !== widgetId);
			}

			if (action === "move-up" && index > 0) {
				const previous = customWidgets[index - 1];
				const prevPos = target.position;
				target.position = previous.position;
				previous.position = prevPos;
			}

			if (action === "move-down" && index < customWidgets.length - 1) {
				const next = customWidgets[index + 1];
				const nextPos = target.position;
				target.position = next.position;
				next.position = nextPos;
			}

			normalizePositions();
			render();
		}

		function availableWidgetTypes() {
			return ["resources", "mentorship", "scot", "calendar"];
		}

		function categories() {
			return ["All", "Teaching", "Resources", "Reporting"];
		}

		function renderCategories() {
			categoryList.innerHTML = categories()
				.map(
					(cat) =>
						`<button class="category-btn ${modalState.category === cat ? "active" : ""}" data-category="${cat}">${cat}</button>`
				)
				.join("");

			categoryList.querySelectorAll(".category-btn").forEach((button) => {
				button.addEventListener("click", () => {
					modalState.category = button.dataset.category;
					renderCategories();
					renderModalOptions();
				});
			});
		}

		function renderModalOptions() {
			const filtered = availableWidgetTypes().filter((type) => {
				const spec = widgetCatalog[type];
				const matchesCategory = modalState.category === "All" || spec.category === modalState.category;
				const text = `${spec.title} ${spec.description}`.toLowerCase();
				const matchesSearch = !modalState.search || text.includes(modalState.search);
				return matchesCategory && matchesSearch;
			});

			widgetOptionGrid.innerHTML = filtered
				.map((type) => {
					const spec = widgetCatalog[type];
					const selectedClass = modalState.selectedType === type ? "selected" : "";
					return `
						<article class="widget-option ${selectedClass}" data-widget-type="${type}">
							<h4>${spec.title}</h4>
							<p>${spec.description}</p>
						</article>
					`;
				})
				.join("");

			widgetOptionGrid.querySelectorAll(".widget-option").forEach((card) => {
				card.addEventListener("click", () => {
					modalState.selectedType = card.dataset.widgetType;
					addSelectedWidgetBtn.disabled = false;
					renderModalOptions();
				});
			});

			if (!filtered.includes(modalState.selectedType)) {
				modalState.selectedType = null;
				addSelectedWidgetBtn.disabled = true;
			}
		}

		function openModal() {
			modalState.open = true;
			modalState.search = "";
			modalState.category = "All";
			modalState.selectedType = null;
			widgetSearch.value = "";
			addSelectedWidgetBtn.disabled = true;
			widgetModal.classList.add("show");
			widgetModal.setAttribute("aria-hidden", "false");
			renderCategories();
			renderModalOptions();
		}

		function closeModal() {
			modalState.open = false;
			widgetModal.classList.remove("show");
			widgetModal.setAttribute("aria-hidden", "true");
		}

		function createWidgetId(type) {
			const count = state.widgets.filter((widget) => widget.type === type).length;
			return `${type}-${count + 1}`;
		}

		function addSelectedWidget() {
			if (!modalState.selectedType) {
				return;
			}

			const newWidget = {
				id: createWidgetId(modalState.selectedType),
				type: modalState.selectedType,
				locked: false,
				position: state.widgets.length
			};

			state.widgets.push(newWidget);
			normalizePositions();
			closeModal();
			render();
		}

		function renderHeader() {
			welcomeText.textContent = `Welcome, ${state.user.name}`;
			helloText.textContent = `Hello ${state.user.name}`;
		}

		function render() {
			renderHeader();
			renderFixedWidgets();
			renderCustomWidgets();
		}

		render();
	</script>
</body>
</html>
